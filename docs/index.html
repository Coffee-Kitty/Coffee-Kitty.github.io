<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>猫猫拯救世界</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="coffeecat 的学习博客，整理 LLM/Agent、LLM4SE、工程工具和算法训练。">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#2f6f68">
  <link rel="stylesheet" href="vendor/docsify/themes/vue.css">
  <link rel="stylesheet" href="vendor/docsify-toc/toc.css">
  <link rel="stylesheet" href="vendor/docsify-sidebar-collapse/sidebar.min.css">
  <link rel="stylesheet" href="vendor/katex/katex.min.css">
  <link rel="stylesheet" href="styles/custom.css">
</head>
<body>
  <div id="app">正在加载 coffeecat 的小屋...</div>

  <script>
    window.$docsify = {
      name: 'coffeecat',
      repo: 'https://github.com/Coffee-Kitty/Coffee-Kitty.github.io',
      homepage: 'README.md',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      notFoundPage: '_404.md',
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 0,
      themeColor: '#2f6f68',
      mergeNavbar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        paths: 'auto',
        placeholder: '搜索文章、论文、代码笔记',
        noData: '没有找到结果',
        depth: 4,
      },
      toc: {
        scope: '.markdown-section',
        headings: 'h1, h2, h3, h4, h5, h6',
        title: '导航',
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制',
      },
      latex: {
        inlineMath: [['$', '$'], ['@', '@']],
        displayMath: [['$$', '$$'], ['@@', '@@']],
      },
      count: {
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90,90,90)',
        language: 'chinese'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true,
        crossChapterText: true,
      },
    }
  </script>

  <script src="vendor/docsify/docsify.min.js"></script>
  <script src="vendor/docsify-toc/toc.js"></script>
  <script src="vendor/docsify/plugins/zoom-image.min.js"></script>
  <script src="vendor/docsify-copy-code/docsify-copy-code.min.js"></script>
  <script src="vendor/docsify-sidebar-collapse/docsify-sidebar-collapse.min.js"></script>
  <script src="vendor/prismjs/components/prism-python.min.js"></script>
  <script src="vendor/prismjs/components/prism-bash.min.js"></script>
  <script src="vendor/prismjs/components/prism-json.min.js"></script>
  <script src="vendor/prismjs/components/prism-yaml.min.js"></script>
  <script src="vendor/prismjs/components/prism-latex.min.js"></script>
  <script src="vendor/katex/katex.min.js"></script>
  <script src="vendor/docsify-latex/docsify-latex.js"></script>
  <script src="vendor/docsify/plugins/search.min.js"></script>
  <script src="vendor/docsify-pagination/docsify-pagination.min.js"></script>
  <script src="vendor/docsify-count/countable.js"></script>
</body>
</html>
